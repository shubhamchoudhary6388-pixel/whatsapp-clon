<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Clone - Vanilla JS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="auth-screen" class="auth-overlay">
        <div class="auth-card">
            <h2 id="auth-title">Login</h2>
            <p id="auth-error" class="error-msg"></p>
            <input type="text" id="reg-name" placeholder="Full Name" class="hidden">
            <input type="text" id="auth-userid" placeholder="User ID (Unique)">
            <input type="password" id="auth-password" placeholder="Password">
            <button id="auth-btn">Login</button>
            <p id="toggle-auth">New user? <span>Register here</span></p>
        </div>
    </div>

    <div id="app-container" class="app-container hidden">
        <aside class="sidebar" id="sidebar">
            <header class="ui-header">
                <div class="user-profile">
                    <div class="avatar" id="my-avatar">U</div>
                    <span id="my-name">Me</span>
                </div>
                <button onclick="logout()" class="icon-btn">Logout</button>
            </header>
            
            <div class="search-container">
                <input type="text" id="user-search" placeholder="Search User ID to add...">
            </div>

            <div class="chat-list" id="chat-list">
                </div>
        </aside>

        <main class="chat-window" id="chat-window">
            <div id="no-chat-selected" class="empty-state">
                <p>Select a user to start chatting</p>
            </div>

            <div id="active-chat-ui" class="hidden">
                <header class="ui-header">
                    <button id="back-btn" class="mobile-only">←</button>
                    <div class="chat-details">
                        <div class="avatar" id="chat-avatar">?</div>
                        <span id="chat-with-name">User</span>
                    </div>
                    <div class="chat-actions">
                        <button id="delete-chat-btn" title="Clear Chat" class="icon-btn">🗑️</button>
                    </div>
                </header>

                <div class="message-area" id="message-area"></div>

                <footer class="input-area">
                    <input type="file" id="file-input" hidden>
                    <button class="icon-btn" onclick="document.getElementById('file-input').click()" title="Attach File">
                        <svg viewBox="0 0 24 24" width="24" height="24" class=""><path fill="currentColor" d="M16.5 6v11.5c0 2.21-1.79 4-4 4s-4-1.79-4-4V5c0-1.38 1.12-2.5 2.5-2.5s2.5 1.12 2.5 2.5v10.5c0 .55-.45 1-1 1s-1-.45-1-1V6H10v9.5c0 1.38 1.12 2.5 2.5 2.5s2.5-1.12 2.5-2.5V5c0-2.21-1.79-4-4-4S7 2.79 7 5v12.5c0 3.59 2.91 6.5 6.5 6.5s6.5-2.91 6.5-6.5V6h-1.5z"></path></svg>
                    </button>
                    <input type="text" id="msg-input" placeholder="Type a message...">
                    <button id="voice-rec-btn" class="icon-btn" title="Voice Message">
                        <svg viewBox="0 0 24 24" width="24" height="24" class=""><path fill="currentColor" d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"></path><path fill="currentColor" d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"></path></svg>
                    </button>
                    <button id="send-btn" class="send-btn">➤</button>
                </footer>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
